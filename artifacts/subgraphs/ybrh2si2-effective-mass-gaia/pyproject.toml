[project]
name = "ybrh2si2-effective-mass-gaia"
version = "0.1.0"
description = "Gaia knowledge package generated from LKM evidence chains for YbRh2Si2 effective-mass scaling."
requires-python = ">=3.12"

[tool.gaia]
namespace = "github"
type = "knowledge-package"
uuid = "9f413629-fb30-490e-bb27-25906c75c25e"
generated_by = "lkm-to-gaia"
generated_from_search = "Fermi liquid effective mass"
generated_from_roots = ["gcn_2741cdef209a457a"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ybrh2si2_effective_mass"]
