description = "Gaia knowledge package generated from LKM evidence chains for Brinkman-Rice Fermi-liquid entropy and Mott effective-mass reasoning."
requires-python = ">=3.12"

[tool.gaia]
type = "knowledge-package"
uuid = "6cb57b0c-89db-4ad8-bc74-e95f7d798aac"
